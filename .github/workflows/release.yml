name: Release Lux Plugin Manager

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'lux-arm64' || 'lux-amd64' }}
    env:
      GONOSUMCHECK: '*'
      GONOSUMDB: '*'
      GOPRIVATE: 'github.com/luxfi/*,github.com/liquidityio/*'
      GOPROXY: direct
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o lpm .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lpm-linux-${{ matrix.arch }}
          path: lpm

  release:
    needs: build
    runs-on: lux-amd64
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
