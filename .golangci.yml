# https://golangci-lint.run/usage/configuration/
run:
  timeout: 10m

issues:
  max-same-issues: 0
  exclude-files:
    - ".*\\.pb\\.go$"

linters:
  disable-all: true
  enable:
    - asciicheck
    - bodyclose
    - errcheck
    - goconst
    - gocritic
    - gofmt
    - gofumpt
    - goimports
    - revive
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - unconvert
    - unparam
    - unused
    - whitespace
    - staticcheck

linters-settings:
  staticcheck:
    checks:
      - "all"
      - "-SA6002"
      - "-SA1019"
  gosec:
    excludes:
      - G107
